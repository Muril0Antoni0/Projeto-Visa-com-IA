<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - VISA Londrina</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="./style/login.css"/>
  <link rel="stylesheet" href="./style/global.css"/>
</head>

<body>
  <main class="main-content">
    <div class="login-wrapper">
      <div class="login-card">
        <div class="login-header">
          <div class="shield-icon large">
            <i class="fa-solid fa-shield-halved"></i>
          </div>
          <h2>VISA Londrina</h2>
          <p>Sistema de Vigilância Sanitária</p>
        </div>

        <form action="portal_static.html" method="GET" class="login-form">
          <div class="form-group">
            <label for="email">E-mail</label>
            <div class="input-wrapper">
              <i class="fa-solid fa-envelope"></i>
              <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required />
            </div>
          </div>

          <div class="form-group">
            <label for="password">Senha</label>
            <div class="input-wrapper">
              <i class="fa-solid fa-lock"></i>
              <input type="password" id="password" name="password" placeholder="Digite sua senha" required />
            </div>
          </div>

          <div class="form-group">
            <label>Acessar como:</label>
            <div class="role-selector">
              <label class="role-option">
                <input type="radio" name="role" value="empresa" checked />
                <div class="role-box">
                  <i class="fa-solid fa-building"></i>
                  <span>Empresa</span>
                </div>
              </label>
              <label class="role-option">
                <input type="radio" name="role" value="analista" />
                <div class="role-box">
                  <i class="fa-solid fa-user-tie"></i>
                  <span>Servidor VISA</span>
                </div>
              </label>
            </div>
          </div>

          <button type="button" onclick="window.location.href = 'portal_static.html'" class="btn-primary full-width">
            Entrar
          </button>

          <div class="login-footer">
            <a href="#">Esqueci minha senha</a>
            <a href="#">Primeiro acesso? Cadastre-se</a>
          </div>
        </form>
      </div>
    </div>
  </main>
  <script src="./js/global.js"></script>
  <script src="./js/login.js"></script>
</body>

</html>
